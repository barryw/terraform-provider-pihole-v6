services:
  pihole:
    image: pihole/pihole:latest
    environment:
      FTLCONF_webserver_api_password: "test-password"
      FTLCONF_webserver_api_app_sudo: "true"
    ports:
      - "18080:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/auth"]
      interval: 5s
      timeout: 3s
      retries: 10
