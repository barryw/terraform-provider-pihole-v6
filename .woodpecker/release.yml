when:
  - event: push
    branch: main

labels:
  platform: linux/amd64

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      tags: true
      depth: 0

depends_on:
  - test
  - commits

steps:
  - name: release
    image: ghcr.io/barryw/woodpecker-release:go
    environment:
      PLUGIN_GITHUB_TOKEN:
        from_secret: github_token
      PLUGIN_GPG_KEY:
        from_secret: gpg_private_key
      PLUGIN_GPG_FINGERPRINT:
        from_secret: gpg_fingerprint
      PLUGIN_MODE: release-go
      PLUGIN_GIT_EMAIL: ci@barrywalker.io
      PLUGIN_GO_PLATFORMS: "linux/amd64,linux/arm64,darwin/amd64,darwin/arm64,windows/amd64"
      PLUGIN_GO_BINARY_NAME: terraform-provider-pihole-v6
      PLUGIN_GPG_SIGN: "true"
      PLUGIN_TERRAFORM_MANIFEST: "true"
