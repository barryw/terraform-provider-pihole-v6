labels:
  platform: linux/amd64

when:
  - event: [push, pull_request, manual]

services:
  pihole:
    image: pihole/pihole:latest
    environment:
      FTLCONF_webserver_api_password: test-password
      FTLCONF_webserver_api_app_sudo: "true"
    ports:
      - 80

steps:
  lint:
    image: golang:1.25
    commands:
      - go vet ./...

  unit-test:
    image: golang:1.25
    commands:
      - go test -v -count=1 ./...
    depends_on: [lint]

  acceptance-test:
    image: golang:1.25
    environment:
      PIHOLE_URL: http://pihole:80
      PIHOLE_PASSWORD: test-password
      TF_ACC: 1
    commands:
      # Wait for PiHole to be ready (unauthenticated /api/auth returns 401 when ready)
      - |
        echo "Waiting for PiHole..."
        for i in $(seq 1 60); do
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://pihole:80/api/auth 2>/dev/null)
          if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "PiHole is ready (HTTP $HTTP_CODE)"
            break
          fi
          echo "Attempt $i/60 (HTTP $HTTP_CODE)..."
          sleep 5
        done
      - go test -v -timeout 30m ./internal/provider/ -count=1
    depends_on: [unit-test]
