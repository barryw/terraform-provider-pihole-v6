name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./... -v

  acceptance:
    runs-on: ubuntu-latest
    needs: [lint, unit]
    services:
      pihole:
        image: pihole/pihole:latest
        env:
          FTLCONF_webserver_api_password: test-password
          FTLCONF_webserver_api_app_sudo: "true"
        ports:
          - 8080:80
        options: >-
          --health-cmd "curl -f http://localhost/api/auth || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      PIHOLE_URL: http://localhost:8080
      PIHOLE_PASSWORD: test-password
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: TF_ACC=1 go test ./internal/provider/ -v -timeout 30m
